databases:
  - name: fuseos-db
    plan: free

services:
  - type: web
    name: fuseos-backend
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      # Auto-wired to the fuseos-db instance above — no manual copy-pasting
      # a connection string between dashboard pages.
      - key: DATABASE_URL
        fromDatabase:
          name: fuseos-db
          property: connectionString
      # Auto-generated by Render — don't reuse the placeholder from your
      # local .env for a real deployment.
      - key: SECRET_KEY
        generateValue: true
      - key: CORS_ORIGINS
        value: "*"
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
      # sync: false = Render will prompt you to type these into the
      # dashboard yourself rather than storing them in this file / git.
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: ALERT_RECIPIENTS
        sync: false
      # Fill this in AFTER the frontend is deployed to Cloudflare Workers —
      # see deployment steps. Leave blank for the first deploy.
      - key: APP_BASE_URL
        sync: false
